name: Java CI with Maven

on:
  push:
    branches: [ "main", "master", "develop", "vibe-coded" ]
  pull_request:
    branches: [ "main", "master", "vibe-coded" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Run JUnit Tests
        run: ./mvnw test

